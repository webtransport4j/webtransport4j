# Server bind address and port
webtransport4j.server.port=4433
webtransport4j.server.host=0.0.0.0

# Server Native Transport Configuration
# Configures the underlying Netty transport used by the server. Native transports offer vastly superior performance.
# Options:
# - auto: (Default) Automatically detects and uses the best available native transport for the OS (IOUring -> Epoll -> KQueue -> NIO).
# - epoll: Forces the use of Linux Epoll.
# - kqueue: Forces the use of macOS/BSD KQueue.
# - iouring: Forces the use of Linux io_uring (requires adding netty-transport-native-io_uring to classpath).
# - nio: Forces the use of standard Java NIO (works on all platforms, but is the slowest).
webtransport4j.server.transport=auto

# QUIC Token Handler
# Supported values: "hmac" (defaults to HmacQuicTokenHandler), "insecure" (defaults to InsecureQuicTokenHandler.INSTANCE), or a fully-qualified class name implementing io.netty.handler.codec.quic.QuicTokenHandler
webtransport4j.quic.token.handler=hmac

# HMAC Token Handler Configuration (only applies if webtransport4j.quic.token.handler=hmac)
#
# webtransport4j.quic.token.handler.hmac.key:
# The secret key used to sign and verify QUIC tokens. 
# For production safety, it MUST be a cryptographically strong key at least 16 bytes long (32 hex characters).
# If not set, the server dynamically generates a new random key at startup.
# WARNING: If left unset, connection tokens issued before a server restart or by different instances in a 
# load-balanced/clustered deployment will be invalid, causing handshake failures.
# Examples: 
# webtransport4j.quic.token.handler.hmac.key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
#
# webtransport4j.quic.token.handler.hmac.expiration.ms:
# The validity lifetime of connection validation tokens in milliseconds. Defaults to 60000 (60 seconds).
# Shorter lifetimes mitigate token interception/replay window, while longer lifetimes account for client clock skew.
# webtransport4j.quic.token.handler.hmac.expiration.ms=60000

# SSL paths (uncomment and specify if not using auto-generated self-signed certificates or localhost.pem / localhost-key.pem in current directory)
webtransport4j.ssl.cert.path=/Users/sam/Documents/localhost.pem
webtransport4j.ssl.key.path=/Users/sam/Documents/localhost-key.pem

# SSL Session Resumption settings (highly recommended for 1-RTT Resumption support)
#
# IMPORTANT: 1-RTT Session Resumption ONLY bypasses the heavy SSL cryptographic handshake.
# It still creates an entirely new QUIC connection under the hood. Any application state,
# business logic, or user authentication must still be manually reconstructed by your code!
#
# webtransport4j.ssl.session.timeout.seconds:
# The validity lifetime of SSL sessions in seconds. If not set, Netty's default session timeout is used (default: 300 seconds / 5 minutes).
# webtransport4j.ssl.session.timeout.seconds=86400
#
# webtransport4j.ssl.session.cache.size:
# The size limit of the SSL session cache. If not set, Netty's default session cache size is used (default: 20480 sessions).
# webtransport4j.ssl.session.cache.size=20480
#
# webtransport4j.ssl.session.ticket.keys:
# The keys used to encrypt and decrypt TLS session tickets for 1-RTT session resumption.
# 
# Why plural? This supports a comma-separated list to allow for Zero-Downtime Key Rotation.
# The first key in the list is the primary key used to encrypt new tickets. The remaining keys 
# are fallback keys used ONLY to decrypt old tickets that were issued before the rotation.
# This prevents a thundering herd of full TLS handshakes when you rotate your security keys.
#
# For Session resumption to work across server restarts or across multiple servers in a cluster,
# you MUST explicitly configure this property so all servers share the same ticket keys.
# Format: A comma-separated list of 96-character hex strings (48 bytes total: 16 byte name, 16 byte HMAC key, 16 byte AES key).
# WARNING: If left unset, BoringSSL generates a random key on startup, making tickets invalid across restarts or servers.
# Example (Rotation: NewKey,OldKey): 
# webtransport4j.ssl.session.ticket.keys=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef,fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210

# Allowed CORS Origins
webtransport4j.allowed.origins=google.com,localhost,127.0.0.1

# Connection limits
webtransport4j.quic.idle.timeout.seconds=30
webtransport4j.quic.max.streams.bidi=100000
webtransport4j.quic.max.streams.uni=100000
webtransport4j.quic.initial.max.data=10000000000
webtransport4j.quic.stream.data.bidi.local=10000000000
webtransport4j.quic.stream.data.bidi.remote=10000000000
webtransport4j.quic.stream.data.uni=10000000000


# Datagram configuration
webtransport4j.quic.datagram.recv.queue.len=10000000000
webtransport4j.quic.datagram.send.queue.len=10000000000

# HTTP/3 Settings Configuration

# Disable QPACK dynamic table compression.
# true  = static table only (recommended for WebTransport workloads)
# false = enable dynamic table compression (better for header-heavy HTTP/3 workloads)

webtransport4j.http3.qpack.dynamic.table.disabled=true

webtransport4j.webtransport.settings.wt_enabled.value=1
webtransport4j.webtransport.settings.nonstandardallowed=0x2c7cf000,0x2b64,0x2b65,0x2b61
webtransport4j.webtransport.settings.enable_h3_datagram=true
webtransport4j.webtransport.settings.enable_connect_protocol=true

# WebTransport-specific defaults (draft-15 overrides) - absolute number (includes open and closed streams)
webtransport4j.webtransport.initial.max.streams.uni=1000
webtransport4j.webtransport.initial.max.streams.bidi=1000
webtransport4j.webtransport.initial.max.data=10000000000

# Flow control fallbacks when limit is unspecified - absolute number (includes open and closed streams)
webtransport4j.webtransport.flowcontrol.fallback.streams.uni=1000
webtransport4j.webtransport.flowcontrol.fallback.streams.bidi=1000
webtransport4j.webtransport.flowcontrol.fallback.data=10000000000

# Flow control limits if WT_STREAMS_BLOCKED - max active stream allowed incase we hit the WT_STREAMS_BLOCKED error
# these are relative values and will be added to the current active streams limit when the error is rcvd.
# so if current active streams is 10 and max active streams is 20 then we can create 10 more streams
webtransport4j.webtransport.flowcontrol.max.active.streams.uni=5
webtransport4j.webtransport.flowcontrol.max.active.streams.bidi=5

#  WT_DATA_BLOCKED  - max data allowed incase we hit the WT_DATA_BLOCKED error
# extends data by this amount not relative like streams
webtransport4j.webtransport.flowcontrol.extend.data=10000

# Maximum simultaneous WebTransport sessions allowed per HTTP/3 connection
webtransport4j.webtransport.max_sessions_per_connection=1

# Traffic shaping / Bandwidth limits (in bytes/s, 0 = unlimited)
# Global Limits (shared across the entire server)
webtransport4j.server.traffic.global.write.limit=0
webtransport4j.server.traffic.global.read.limit=0

# Connection Limits (per QUIC connection) (in bytes/s, 0 = unlimited)
webtransport4j.server.traffic.connection.write.limit=0
webtransport4j.server.traffic.connection.read.limit=0

# Stream Limits (per individual stream) (in bytes/s, 0 = unlimited)
webtransport4j.server.traffic.stream.write.limit=0
webtransport4j.server.traffic.stream.read.limit=0

# FIXED_THREAD_POOL/NETTY_EVENT_LOOP/VIRTUAL_THREADS/NETTY_EVENT_EXECUTOR_GROUP
# Note: For single-threaded execution (strict sequential ordering of callbacks),
# set execution mode to FIXED_THREAD_POOL and webtransport4j.business.pool.size=1, or
# set execution mode to NETTY_EVENT_EXECUTOR_GROUP (which provides per-connection sequential pinning).
webtransport4j.dispatch.execution.mode=VIRTUAL_THREADS

# Netty DefaultEventExecutorGroup configuration
# Only used when dispatch execution mode is NETTY_EVENT_EXECUTOR_GROUP.
# Defaults to Runtime.getRuntime().availableProcessors() * 2 if not set.
# webtransport4j.netty.executor.group.size=16

# Thread Pool size
# Note: webtransport4j.business.pool.size, webtransport4j.business.queue.capacity and webtransport4j.business.queue.type
# are only used when the dispatch execution mode is FIXED_THREAD_POOL. They have no effect under other modes.
# A pool size of 1 can be used to guarantee single-threaded sequential execution.
# A queue capacity of 0 or less, or leaving it unset, defaults to Integer.MAX_VALUE (unbounded).
# Queue type options: LINKED (uses LinkedBlockingQueue) or ARRAY/RING_BUFFER (uses ArrayBlockingQueue/RingBuffer).
webtransport4j.business.pool.size=8
webtransport4j.business.queue.capacity=10000
webtransport4j.business.queue.type=RING_BUFFER
# Task rejection policy when the business executor queue is full.
#
# Supported values:
#   ABORT          - Throw RejectedExecutionException (default)
#   CALLER_RUNS    - Execute task in the caller thread
#   DISCARD        - Silently discard the task
#   DISCARD_OLDEST - Discard the oldest queued task and retry
#
# Alternatively, specify a fully-qualified class name implementing:
#   java.util.concurrent.RejectedExecutionHandler
#
# Example:
# webtransport4j.business.rejection.policy=com.example.MyRejectedExecutionHandler
#
# Default:
# webtransport4j.business.rejection.policy=ABORT
webtransport4j.business.rejection.policy=ABORT


# --- DoS Protections ---
# Global limit across all active WebTransport sessions on the entire server.
webtransport4j.server.max_concurrent_sessions=10000

# Per-IP Rate Limiting (QUIC handshakes per minute per IP)
webtransport4j.server.ratelimit.max_connections_per_ip_per_minute=100

# Choose the IP filter engine for rate-limit rules. Options: 'netty' (linear list) or 'trie' (O(1) prefix tree).
webtransport4j.server.ratelimit.filter_engine=trie

# Comma-separated list of IPs or CIDR prefixes to bypass the rate limiter.
# Supports IPv4 (e.g., 127.0.0.1, 10.0.0.0/8) and IPv6 (e.g., ::1, fe80::/10, 2001:db8::/32).
webtransport4j.server.ratelimit.whitelist=127.0.0.1, 10.0.0.0/8, ::1, 2001:db8::/32

# Provide specific override limits for certain IPs or CIDR blocks (format IP/CIDR:LIMIT).
# Supports IPv4 (e.g., 192.168.1.0/24:5000) and IPv6 (e.g., fe80::1:10, 2001:db8::/64:500).
# The parser correctly identifies the last colon to separate the IP/CIDR from the limit.
webtransport4j.server.ratelimit.overrides=192.168.1.0/24:5000, 10.0.0.1:0, fe80::1:100, 2001:db8::/64:500

# Comma-separated list of known malicious IPs to block instantly.
# IMPORTANT: This list is loaded into a probabilistic Bloom Filter for maximum memory efficiency.
# Because it is a Bloom Filter, it ONLY supports exact IPs (IPv4 or IPv6), NOT CIDR blocks.
# If you ever need to blanket-block an entire CIDR subnet, you can simply add it to the overrides property with a limit of 0! For example: 192.168.2.0/24:0 will immediately terminate any connection from that subnet.
webtransport4j.server.ratelimit.blocklist=9.9.9.9, 1.2.3.4, 2001:db8::9999
# Bloom Filter tuning for the blocklist (adjust these based on your expected blocklist size)
webtransport4j.server.ratelimit.blocklist.bloom_capacity=1000000
webtransport4j.server.ratelimit.blocklist.bloom_fpp=0.000000001

# --- Keep-Alive / Heartbeat Configuration ---
# Enable application-level keep-alives via a dedicated heartbeat stream.
# If enabled, the client is expected to:
#   1. Create a client-initiated bidirectional stream.
#   2. Send the magic byte (configured below, defaults to 63 / 0x3F) as the very first byte of the stream payload to register it as the keep-alive channel.
#   3. Periodically write a PING byte (e.g. 0x01 in STRICT mode, or any payload in ECHO mode).
#   4. Keep this bidirectional stream open for the entire duration of the session (do not close it).
webtransport4j.server.keepalive.enabled=true
# Keep-Alive operation mode. Options:
#   - 'STRICT': Server expects a specific 'ping.byte' (below) and replies with a specific 'pong.byte' (below).
#   - 'ECHO': Server echoes back whatever payload the client sends on the heartbeat stream (perfect for RTT calculation).
webtransport4j.server.keepalive.mode=STRICT
# The expected PING byte in STRICT mode (as a decimal integer 0-255, default 1)
webtransport4j.server.keepalive.ping.byte=1
# The returned PONG byte in STRICT mode (as a decimal integer 0-255, default 1)
webtransport4j.server.keepalive.pong.byte=1
# The magic identification byte (as a decimal integer 0-255) that registers a stream for keep-alive (default 63 = 0x3F '?')
webtransport4j.server.keepalive.stream.magic.byte=63
# Max duration (in seconds) allowed without receiving any data/heartbeat from the client before reaping the session.
# NOTE: It is recommended that (timeout.secs + interval.secs) is less than the QUIC transport-level idle timeout
# (configured via 'webtransport4j.quic.idle.timeout.seconds') to allow graceful application reaping before QUIC drops the connection.
webtransport4j.server.keepalive.timeout.secs=30
# Interval (in seconds) at which the server scans sessions to reap timed out ones
webtransport4j.server.keepalive.interval.secs=5
